services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: vcos
      POSTGRES_PASSWORD: vcos
      POSTGRES_DB: vcos
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vcos -d vcos"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - vcos-postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      VCOS_DATABASE_URL: ${VCOS_DOCKER_DATABASE_URL:-postgresql+psycopg://vcos:vcos@postgres:5432/vcos}
      OLLAMA_BASE_URL: ${VCOS_DOCKER_OLLAMA_BASE_URL:-http://ollama:11434}
      VCOS_CORS_ALLOWED_ORIGINS: ${VCOS_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    ports:
      - "${VCOS_API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./var:/app/var
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_VCOS_API_BASE_URL: ${NEXT_PUBLIC_VCOS_API_BASE_URL:-http://localhost:8000}
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    ports:
      - "${VCOS_FRONTEND_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  ollama:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      VCOS_LLM_MODEL_CHEAP_STRUCTURED_PRIMARY: ${VCOS_LLM_MODEL_CHEAP_STRUCTURED_PRIMARY:-gpt-oss:20b-cloud}
      VCOS_LLM_MODEL_CHEAP_STRUCTURED_FALLBACK: ${VCOS_LLM_MODEL_CHEAP_STRUCTURED_FALLBACK:-qwen3.5:cloud}
      VCOS_LLM_MODEL_DEFAULT_MULTIMODAL_PRIMARY: ${VCOS_LLM_MODEL_DEFAULT_MULTIMODAL_PRIMARY:-qwen3.5:cloud}
      VCOS_LLM_MODEL_DEFAULT_MULTIMODAL_FALLBACK: ${VCOS_LLM_MODEL_DEFAULT_MULTIMODAL_FALLBACK:-gemma4:31b-cloud}
      VCOS_LLM_MODEL_VISUAL_CREATIVE_REVIEW_PRIMARY: ${VCOS_LLM_MODEL_VISUAL_CREATIVE_REVIEW_PRIMARY:-minimax-m3:cloud}
      VCOS_LLM_MODEL_VISUAL_CREATIVE_REVIEW_FALLBACK: ${VCOS_LLM_MODEL_VISUAL_CREATIVE_REVIEW_FALLBACK:-qwen3.5:cloud}
      VCOS_LLM_MODEL_VISUAL_CREATIVE_REVIEW_EMERGENCY: ${VCOS_LLM_MODEL_VISUAL_CREATIVE_REVIEW_EMERGENCY:-gemma4:31b-cloud}
      VCOS_LLM_MODEL_LONG_CONTEXT_TEXT_PRIMARY: ${VCOS_LLM_MODEL_LONG_CONTEXT_TEXT_PRIMARY:-deepseek-v4-flash:cloud}
      VCOS_LLM_MODEL_LONG_CONTEXT_TEXT_FALLBACK: ${VCOS_LLM_MODEL_LONG_CONTEXT_TEXT_FALLBACK:-nemotron-3-super:cloud}
      VCOS_LLM_MODEL_LONG_CONTEXT_TEXT_PREMIUM: ${VCOS_LLM_MODEL_LONG_CONTEXT_TEXT_PREMIUM:-deepseek-v4-flash:cloud}
      VCOS_LLM_MODEL_ENGINEERING_ARCHITECT_PRIMARY: ${VCOS_LLM_MODEL_ENGINEERING_ARCHITECT_PRIMARY:-qwen3-coder:480b-cloud}
      VCOS_LLM_MODEL_ENGINEERING_ARCHITECT_FALLBACK: ${VCOS_LLM_MODEL_ENGINEERING_ARCHITECT_FALLBACK:-kimi-k2.7-code:cloud}
      VCOS_LLM_MODEL_ENGINEERING_ARCHITECT_BACKUP: ${VCOS_LLM_MODEL_ENGINEERING_ARCHITECT_BACKUP:-deepseek-v4-flash:cloud}
      VCOS_LLM_MODEL_GATEKEEPER_SOFT_REVIEW_PRIMARY: ${VCOS_LLM_MODEL_GATEKEEPER_SOFT_REVIEW_PRIMARY:-nemotron-3-super:cloud}
      VCOS_LLM_MODEL_GATEKEEPER_SOFT_REVIEW_FALLBACK: ${VCOS_LLM_MODEL_GATEKEEPER_SOFT_REVIEW_FALLBACK:-deepseek-v4-flash:cloud}
      VCOS_LLM_MODEL_GATEKEEPER_SOFT_REVIEW_PREMIUM: ${VCOS_LLM_MODEL_GATEKEEPER_SOFT_REVIEW_PREMIUM:-deepseek-v4-flash:cloud}
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - vcos-ollama-data:/root/.ollama

volumes:
  vcos-postgres-data:
  vcos-ollama-data:

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: vcos
      POSTGRES_PASSWORD: vcos
      POSTGRES_DB: vcos
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vcos -d vcos"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - vcos-postgres-data:/var/lib/postgresql/data

volumes:
  vcos-postgres-data:

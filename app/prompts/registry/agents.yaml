registry_version: "1.0.0"
default_user_template_ref: &default_user_template_ref app/prompts/agents/user_templates/base_task_payload.md
default_output_schema_ref: &default_output_schema_ref app/prompts/schemas/base_envelope.schema.json
schema_ref: &schema_ref base_agent_envelope
schema_version: &schema_version "1.0.0"
status: &active ACTIVE
common_skill_refs: &common_skill_refs
  - app/prompts/common/common_vcos_constitution.md
  - app/prompts/common/common_channel_contract.md
  - app/prompts/common/common_output_contract.md
  - app/prompts/common/common_evidence_handling.md
  - app/prompts/common/common_policy_safety.md
  - app/prompts/common/common_operator_language.md
  - app/prompts/common/common_market_locale_context.md
  - app/prompts/common/common_media_constraints.md
  - app/prompts/common/common_cost_awareness.md
  - app/prompts/common/common_rights_disclosure.md
  - app/prompts/common/common_json_repair.md
safety_policy_refs: &safety_policy_refs
  - common_vcos_constitution
  - common_channel_contract
  - common_policy_safety
  - common_evidence_handling
  - common_rights_disclosure
input_contract: &input_contract
  required:
    - task_payload
    - channel_contract_json
    - compiled_policy_snapshot_json
    - channel_profile_version_id
    - compiled_policy_snapshot_id
  optional:
    - evidence_refs
    - artifact_refs
    - market_locale_context_json
output_contract: &output_contract
  schema_ref: base_agent_envelope
  required_envelope_fields:
    - contract_version
    - agent_key
    - status
    - confidence_label
    - risk_level
    - evidence_refs
    - limitations
    - next_action
    - operator_summary_vi
    - technical_appendix
    - artifact

agents:
  - agent_key: ChannelAuthorityAgent
    template_key: channel_authority_agent.production
    template_version: "1.0.0"
    status: *active
    system_delta_ref: app/prompts/agents/system_deltas/channel_authority_agent.md
    user_template_ref: *default_user_template_ref
    output_schema_ref: *default_output_schema_ref
    schema_ref: *schema_ref
    schema_version: *schema_version
    allowed_router_lanes: [cheap_structured, long_context_text]
    default_router_lane: cheap_structured
    input_contract: *input_contract
    output_contract: *output_contract
    safety_policy_refs: *safety_policy_refs
    common_skill_refs: *common_skill_refs
    channel_contract_required: true
    market_locale_context_required: true
